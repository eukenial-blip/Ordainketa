<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordainketa metodoak</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1 {
  font-size: 20px;
  margin-bottom: 10px;
  text-align: center;
}

.descripcion {
  font-size: 14px;
  color: #555;
  text-align: center;
  margin-bottom: 20px;
}

/* DATU BLOKEA */
.dato {
  margin-bottom: 15px;
}

.label {
  font-size: 12px;
  color: #888;
}

.valor {
  font-size: 16px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  word-break: break-all;
}

/* KOPIATU BOTOIA */
.copy-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: #1a73e8;
}

.copy-btn:active {
  opacity: 0.6;
}

.mensaje {
  text-align: center;
  color: green;
  font-size: 13px;
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Ordainketa metodoak</h1>

  <div class="descripcion">
    Gaur egun, ordainketak banku-transferentziaren bidez egiten dira.
    Etorkizunean ordainketa metodo gehiago gehituko ditugu.
  </div>

  <div class="dato">
    <div class="label">IBAN</div>
    <div class="valor">
      <span id="iban">ES68 0182 0079 0102 0156 4161</span>
      <button class="copy-btn" onclick="kopiatuIBAN()">📋</button>
    </div>
  </div>

  <div class="dato">
    <div class="label">Onuraduna</div>
    <div class="valor">
      Lamino Kirol Kluba
    </div>
  </div>

  <div class="dato">
    <div class="label">Kontzeptua</div>
    <div class="valor">
      Zure izena + zerbitzua
    </div>
  </div>

  <div class="mensaje" id="mensaje">
    ✔ Zenbakia arbelean kopiatu da
  </div>
</div>

<script>
function kopiatuIBAN() {
  const texto = document.getElementById("iban").innerText;

  navigator.clipboard.writeText(texto).then(function() {
    const mensaje = document.getElementById("mensaje");
    mensaje.style.display = "block";

    setTimeout(() => {
      mensaje.style.display = "none";
    }, 1500);
  }).catch(function() {
    alert("Ezin izan da automatikoki kopiatu. Eutsi IBANari kopiatzeko.");
  });
}
</script>

</body>
</html>
